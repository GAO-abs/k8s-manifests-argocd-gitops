apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-dashboard
  labels:
    app: admin-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-dashboard
  template:
    metadata:
      labels:
        app: date-service
    spec:
      containers:
      - name: date-service
        image: swr.af-south-1.myhuaweicloud.com/george/admin-dashboard:0cc7939797813fab8f9ed44a05bba1b3ec2b5d3d
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
      imagePullSecrets:
      - name: default-secret


---
apiVersion: v1
kind: Service
metadata:
  name: admin-dashboard
spec:
  selector:
    app: admin-dashboard
  ports:
  - port: 8081
    targetPort: 80